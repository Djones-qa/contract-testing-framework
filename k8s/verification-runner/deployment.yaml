apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification-runner
  namespace: contract-testing
  labels:
    app: verification-runner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: verification-runner
  template:
    metadata:
      labels:
        app: verification-runner
    spec:
      serviceAccountName: verification-runner
      containers:
        - name: verification-runner
          image: contract-testing/verification-runner:latest
          ports:
            - containerPort: 4002
              protocol: TCP
          env:
            - name: CONTRACT_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: contract-testing-config
                  key: contract-broker-url
            - name: PORT
              value: "4002"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
