---
# ServiceAccount for Contract Broker
apiVersion: v1
kind: ServiceAccount
metadata:
  name: contract-broker
  namespace: contract-testing
  labels:
    app: contract-broker
---
# Role for Contract Broker - minimal permissions for health checks
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: contract-broker-role
  namespace: contract-testing
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# RoleBinding for Contract Broker
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: contract-broker-rolebinding
  namespace: contract-testing
subjects:
  - kind: ServiceAccount
    name: contract-broker
    namespace: contract-testing
roleRef:
  kind: Role
  name: contract-broker-role
  apiGroup: rbac.authorization.k8s.io
---
